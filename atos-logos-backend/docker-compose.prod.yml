networks:
  backend_net:
    driver: bridge

volumes:
  postgres_data:

services:
  db:
    image: postgres:18.3-alpine3.23
    container_name: atos_logos_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend_net
    # Sem exposição de porta — banco acessível apenas dentro da rede interna

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: atos_logos_api
    restart: always
    ports:
      - "80:3000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      NODE_ENV: production
      PORT: 3000
    depends_on:
      - db
    networks:
      - backend_net
