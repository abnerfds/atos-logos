name: Deploy Atos Logos Backend

on:
  push:
    branches:
      - main
    # paths:
    #   - 'atos-logos-backend/**' # Só roda se houver alteração na pasta do backend

jobs:
  build-and-push:
    name: Build & Push to Oracle Cloud (OCIR)
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. ADICIONADO: Emulador para permitir build ARM em máquina Intel
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to OCI Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.OCI_REGISTRY }}
          username: ${{ secrets.OCI_USERNAME }}
          password: ${{ secrets.OCI_AUTH_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./atos-logos-backend
          file: ./atos-logos-backend/Dockerfile
          push: true
          # 2. ADICIONADO: Força o build para a arquitetura da VM da Oracle
          platforms: linux/arm64
          # Monta a URL dinamicamente baseada nos seus Secrets
          tags: ${{ secrets.OCI_REGISTRY }}/${{ secrets.OCI_NAMESPACE }}/atos-logos-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Configurar SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Copiar arquivos para o servidor
        run: | 
            cat << 'EOF' > .env
            ${{ secrets.ENV_PROD }}
            EOF

            scp .env "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:~/.env.atos-logos-backend"
            scp atos-logos-backend/docker-compose.prod.yml "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:~/docker-compose.atos-logos-backend"

  deploy:
    name: Deploy to Ubuntu VM
    needs: build-and-push
    runs-on: ubuntu-latest
    
    steps:
      - name: Configurar SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Faz pull para o container na VPS
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'

            cleanup() {
              rm -rf ~/.env.atos-logos-backend || true
              rm -rf ~/docker-compose.atos-logos-backend || true
            }
            trap cleanup EXIT

            docker compose -f ~/docker-compose.atos-logos-backend --env-file ~/.env.atos-logos-backend up -d
          EOF

