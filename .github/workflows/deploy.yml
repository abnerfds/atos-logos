name: Deploy Atos Logos Backend

on:
  push:
    branches:
      - main
    # paths:
    #   - 'atos-logos-backend/**' # Só roda se houver alteração na pasta do backend

jobs:
  build-and-push:
    name: Build & Push to Oracle Cloud (OCIR)
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      # 1. ADICIONADO: Emulador para permitir build ARM em máquina Intel
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to OCI Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ secrets.OCI_REGISTRY }}
          username: ${{ secrets.OCI_USERNAME }}
          password: ${{ secrets.OCI_AUTH_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v7
        with:
          context: ./atos-logos-backend
          # file: ./atos-logos-backend/Dockerfile
          push: true
          # 2. ADICIONADO: Força o build para a arquitetura da VM da Oracle
          platforms: linux/arm64
          # Monta a URL dinamicamente baseada nos seus Secrets
          tags: ${{ secrets.OCI_REGISTRY }}/${{ secrets.OCI_NAMESPACE }}/atos-logos-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Configurar SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Copiar arquivos para o servidor
        env:
          ENV_PROD: ${{ secrets.ENV_PROD }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
        run: |
          # Criar arquivo .env de forma mais limpa e imune a quebras
          echo "$ENV_PROD" > .env
          
          # Copia o .env para a home do usuário (como na sua imagem)
          scp .env "${SSH_USER}@${SSH_HOST}:~/.env.atos-logos-backend"
          
          # Copia o docker-compose (certifique-se que o caminho de destino exista na VPS)
          # Exemplo: Se vai para ~/app/, essa pasta ~/app já deve existir lá!
          scp atos-logos-backend/docker-compose.prod.yml "${SSH_USER}@${SSH_HOST}:~/"

      - name: Executar Deploy na VPS (Pull e Up)
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          OCI_REGISTRY: ${{ secrets.OCI_REGISTRY }}
          OCI_USERNAME: ${{ secrets.OCI_USERNAME }}
          OCI_AUTH_TOKEN: ${{ secrets.OCI_AUTH_TOKEN }}
        run: |
          # Executa os comandos remotamente na sua VPS da Oracle
          ssh "${SSH_USER}@${SSH_HOST}" "
            # 1. Autentica o Docker da VPS no seu OCI Registry privado
            echo '${OCI_AUTH_TOKEN}' | docker login ${OCI_REGISTRY} -u '${OCI_USERNAME}' --password-stdin
            
            # 2. Faz o pull da imagem recém-buildada usando os arquivos copiados anteriormente
            docker compose -f docker-compose.prod.yml --env-file ~/.env.atos-logos-backend pull
            
            # 3. Sobe/Atualiza os containers em background (-d)
            docker compose -f docker-compose.prod.yml --env-file ~/.env.atos-logos-backend up -d
            
            # 4. Remove imagens antigas que ficaram órfãs após a atualização
            docker image prune -f
          "

