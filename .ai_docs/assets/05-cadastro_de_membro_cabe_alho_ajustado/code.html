<!DOCTYPE html>

<html class="light" lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>

                    "on-tertiary-fixed": "#382e55",

<style type="text/tailwindcss">
        body { font-family: 'Inter', sans-serif; background-color: #f7f9fc; color: #2c3338; -webkit-font-smoothing: antialiased; }
        .font-headline { font-family: 'Manrope', sans-serif; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; display: inline-block; }.accordion-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out, padding 0.3s ease;
        }
        input:checked ~ .accordion-content {
            max-height: 1000px;
            padding-top: 1.25rem;
            padding-bottom: 1.5rem;
        }
        input:checked ~ label .chevron-icon {
            transform: rotate(180deg);
        }
    </style>
<style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>
<body class="bg-background min-h-screen flex flex-col">
<header class="fixed top-0 w-full z-50 bg-[#f7f9fc]/70 backdrop-blur-xl flex items-center justify-between px-6 h-16">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-[#37628a] cursor-pointer">menu</span>
<h1 class="text-xl font-bold tracking-tighter text-[#37628a]">Atos Logos</h1>
</div>
<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-full overflow-hidden bg-surface-container-high border-2 border-primary-container">
<img alt="Profile" class="w-full h-full object-cover" data-alt="Professional portrait of a friendly woman with a warm smile, corporate office setting with soft natural light" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCENF8cMsAk_v_oJzggFahUTYkdrrWFeP_BLgFxFpHJQzsBVq9OgeGgXSxeuEuVkvrIwrIsf-qtR8-KXKq56kq9jGIIVZQbDGaMbkH8uQHhJWsTkMUehjIxBl63J2kcxkd-jo3MsDdMvJ44s5QZjQAARy_eFK27QRF8buSXd5l2zOyOvXURUC-moMLlQDpk9EMpRN1qrcobdtp-EK8XfxMDHOt77qhnJamw880W5Ku9x4LPAKmEWZi_nyw7oyIdBQzqY9WUabn_J3A"/>
</div>
</div>
</header>
<main class="flex-grow container mx-auto max-w-2xl px-6 pt-24 pb-32">
<div class="mb-8 flex items-center gap-4">
<button class="w-10 h-10 flex items-center justify-center rounded-lg bg-surface-container-low text-primary hover:bg-surface-container-high transition-all active:scale-95">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<div>
<h2 class="font-headline text-3xl font-bold text-on-surface tracking-tight">Novo Membro</h2>
<p class="text-on-surface-variant text-sm">Preencha os dados para efetuar o registro na secretaria.</p>
</div>
</div>
<form class="space-y-4">
<!-- Profile Photo Section -->
<div class="bg-surface-container-lowest rounded-2xl p-8 shadow-sm border border-surface-variant flex flex-col items-center justify-center mb-6">
<div class="relative group cursor-pointer">
<div class="w-32 h-32 rounded-full bg-surface-container flex items-center justify-center border-2 border-outline-variant group-hover:border-primary transition-colors overflow-hidden"><img alt="Foto do Perfil" class="w-full h-full object-cover rounded-full" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAyqs2jvVdBnbn7R_o8IxnEDXpipgLJnR2--rpPKKC8hj52n1fP3_4w1mntLE3dGWTUnQQEahoftNASFI1XuEjLQ5LpXfGZS9W2q1S5RWElt7DhCdIOLIie1SbzPrGdx_ewY39AWKWHDwMml5SF_S4W4BxjxWYurr7spKeb65LdSPAqk8k6sp8dsG780oZTvOaepf05sbmG4zEyifBXpZHHQgraYqaihMQrcwBjd03D7PkY8Jm0IY3O4N_--ONLhCijGgUU6TEWDOI"/></div>
<div class="absolute bottom-0 right-0 w-10 h-10 bg-primary text-on-primary rounded-full flex items-center justify-center border-4 border-surface-container-lowest shadow-md">
<span class="material-symbols-outlined text-xl" data-icon="add">add</span>
</div>
</div>
<span class="mt-4 text-sm font-semibold text-on-surface-variant">Foto do Perfil</span>
</div>
<div class="bg-surface-container-lowest rounded-2xl shadow-sm border border-surface-variant overflow-hidden">
<input checked="" class="hidden peer" id="section-pessoal" type="checkbox"/>
<label class="flex items-center justify-between px-6 py-5 cursor-pointer active:bg-surface-container-low transition-colors" for="section-pessoal">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary text-2xl" data-icon="person">person</span>
<h3 class="font-headline font-bold text-lg text-on-surface">Informações Pessoais</h3>
</div>
<span class="material-symbols-outlined text-on-surface-variant transition-transform duration-300 chevron-icon" data-icon="expand_more">expand_more</span>
</label>
<div class="accordion-content px-6 border-t border-surface-container">
<div class="space-y-5">
<div class="space-y-1.5">
<label class="text-xs font-semibold uppercase tracking-wider text-on-surface-variant ml-1">Nome Completo</label>
<input class="w-full bg-surface-container-high border-none rounded-lg focus:ring-0 focus:bg-surface-container-lowest transition-all px-4 py-3 text-on-surface placeholder:text-outline/50" placeholder="Digite o nome completo" type="text"/>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-5">
<div class="space-y-1.5">
<label class="text-xs font-semibold uppercase tracking-wider text-on-surface-variant ml-1">E-mail</label>
<input class="w-full bg-surface-container-high border-none rounded-lg focus:ring-0 focus:bg-surface-container-lowest transition-all px-4 py-3 text-on-surface placeholder:text-outline/50" placeholder="exemplo@email.com" type="email"/>
</div>
<div class="space-y-1.5">
<label class="text-xs font-semibold uppercase tracking-wider text-on-surface-variant ml-1">CPF</label>
<input class="w-full bg-surface-container-high border-none rounded-lg focus:ring-0 focus:bg-surface-container-lowest transition-all px-4 py-3 text-on-surface placeholder:text-outline/50" placeholder="000.000.000-00" type="text"/>
</div>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-5">
<div class="space-y-1.5">
<label class="text-xs font-semibold uppercase tracking-wider text-on-surface-variant ml-1">Telefone</label>
<input class="w-full bg-surface-container-high border-none rounded-lg focus:ring-0 focus:bg-surface-container-lowest transition-all px-4 py-3 text-on-surface placeholder:text-outline/50" placeholder="(00) 00000-0000" type="tel"/>
</div>
<div class="space-y-1.5">
<label class="text-xs font-semibold uppercase tracking-wider text-on-surface-variant ml-1">Data de Nascimento</label>
<input class="w-full bg-surface-container-high border-none rounded-lg focus:ring-0 focus:bg-surface-container-lowest transition-all px-4 py-3 text-on-surface" type="date"/>
</div>
</div>
</div>
</div>
</div>
<div class="bg-surface-container-lowest rounded-2xl shadow-sm border border-surface-variant overflow-hidden">
<input class="hidden peer" id="section-eclesiastico" type="checkbox"/>
<label class="flex items-center justify-between px-6 py-5 cursor-pointer active:bg-surface-container-low transition-colors" for="section-eclesiastico">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary text-2xl" data-icon="church">church</span>
<h3 class="font-headline font-bold text-lg text-on-surface">Dados Eclesiásticos</h3>
</div>
<span class="material-symbols-outlined text-on-surface-variant transition-transform duration-300 chevron-icon" data-icon="expand_more">expand_more</span>
</label>
<div class="accordion-content px-6 border-t border-surface-container">
<div class="space-y-5">
<div class="grid grid-cols-1 md:grid-cols-2 gap-5">
<div class="space-y-1.5">
<label class="text-xs font-semibold uppercase tracking-wider text-on-surface-variant ml-1">Data de Batismo</label>
<input class="w-full bg-surface-container-high border-none rounded-lg focus:ring-0 focus:bg-surface-container-lowest transition-all px-4 py-3 text-on-surface" type="date"/>
</div>
<div class="space-y-1.5">
<label class="text-xs font-semibold uppercase tracking-wider text-on-surface-variant ml-1">Data de Admissão</label>
<input class="w-full bg-surface-container-high border-none rounded-lg focus:ring-0 focus:bg-surface-container-lowest transition-all px-4 py-3 text-on-surface" type="date"/>
</div>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-5">
<div class="space-y-1.5">
<label class="text-xs font-semibold uppercase tracking-wider text-on-surface-variant ml-1">Cargo</label>
<select class="w-full bg-surface-container-high border-none rounded-lg focus:ring-0 focus:bg-surface-container-lowest transition-all px-4 py-3 text-on-surface appearance-none">
<option disabled="" selected="">Selecione o cargo</option>
<option>Membro</option>
<option>Diácono</option>
<option>Presbítero</option>
<option>Evangelista</option>
<option>Pastor</option>
</select>
</div>
<div class="space-y-1.5">
<label class="text-xs font-semibold uppercase tracking-wider text-on-surface-variant ml-1">Congregação Vinculada</label>
<select class="w-full bg-surface-container-high border-none rounded-lg focus:ring-0 focus:bg-surface-container-lowest transition-all px-4 py-3 text-on-surface appearance-none">
<option disabled="" selected="">Selecione a unidade</option>
<option>Sede Central</option>
<option>Congregação Norte</option>
<option>Congregação Sul</option>
<option>Ponto de Pregação Leste</option>
</select>
</div>
</div>
</div>
</div>
</div>
</form>
</main>
<button class="fixed bottom-28 right-6 w-14 h-14 rounded-2xl bg-primary text-on-primary flex items-center justify-center shadow-[0_12px_40px_rgba(55,98,138,0.3)] hover:scale-105 active:scale-95 transition-all z-40">
<span class="material-symbols-outlined text-3xl" data-icon="check" style="font-variation-settings: 'FILL' 0, 'wght' 600;">check</span>
</button>
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center px-2 pb-8 pt-3 bg-[#f7f9fc]/70 backdrop-blur-xl rounded-t-2xl shadow-[0_-12px_40px_rgba(44,51,56,0.06)] z-50">
<div class="flex flex-col items-center justify-center text-[#596065] px-2 py-1.5 hover:bg-[#e9eef3] rounded-2xl transition-all active:scale-90 duration-200 cursor-pointer min-w-[64px]">
<span class="material-symbols-outlined" data-icon="home">home</span>
<span class="font-['Inter'] text-[10px] font-medium mt-1">Início</span>
</div>
<div class="flex flex-col items-center justify-center bg-[#cde6f4] text-[#37628a] rounded-2xl px-2 py-1.5 active:scale-90 duration-200 cursor-pointer min-w-[64px]">
<span class="material-symbols-outlined" data-icon="account_balance" style="font-variation-settings: 'FILL' 1;">account_balance</span>
<span class="font-['Inter'] text-[10px] font-bold mt-1">Secretaria</span>
</div>
<div class="flex flex-col items-center justify-center text-[#596065] px-2 py-1.5 hover:bg-[#e9eef3] rounded-2xl transition-all active:scale-90 duration-200 cursor-pointer min-w-[64px]">
<span class="material-symbols-outlined" data-icon="notifications">notifications</span>
<span class="font-['Inter'] text-[10px] font-medium mt-1">Notificações</span>
</div>
<div class="flex flex-col items-center justify-center text-[#596065] px-2 py-1.5 hover:bg-[#e9eef3] rounded-2xl transition-all active:scale-90 duration-200 cursor-pointer min-w-[64px]">
<span class="material-symbols-outlined" data-icon="calendar_month">calendar_month</span>
<span class="font-['Inter'] text-[10px] font-medium mt-1">Agenda</span>
</div>
<div class="flex flex-col items-center justify-center text-[#596065] px-2 py-1.5 hover:bg-[#e9eef3] rounded-2xl transition-all active:scale-90 duration-200 cursor-pointer min-w-[64px]">
<span class="material-symbols-outlined" data-icon="analytics">analytics</span>
<span class="font-['Inter'] text-[10px] font-medium mt-1">Gestão</span>
</div>
</nav>
</body></html>
