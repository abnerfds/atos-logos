<body class="bg-background text-on-surface min-h-screen pb-32">
<!-- TopAppBar -->
<header class="bg-[#f7f9fc] dark:bg-[#1a1c1e] w-full top-0 z-50 sticky">
<div class="flex items-center px-6 py-4 gap-4">
<div class="flex items-center gap-2">

<div class="flex-grow"></div>

</button>
</div>
</div>

<div class="absolute bottom-1 right-1 bg-primary text-on-primary p-2 rounded-full shadow-lg border-2 border-surface-container-lowest active:scale-90 transition-transform">
<span class="material-symbols-outlined text-sm" data-icon="photo_camera">photo_camera</span>
</div>
</div>
<p class="mt-4 text-on-surface-variant font-medium text-sm">Toque para alterar a foto</p>

                    Ana Beatriz Silva
                </div>
</div>
<div class="flex flex-col gap-1">
<label class="text-xs font-semibold text-on-surface-variant uppercase tracking-wider ml-1">CPF</label>
<div class="bg-surface-container-high/50 px-4 py-3 rounded-lg border-none text-on-surface/60 font-medium">
                    123.456.789-00
                </div>
</div>
</div>
<!-- Editable Fields -->
<div class="space-y-5">
<div class="flex flex-col gap-1">
<label class="text-xs font-semibold text-on-surface-variant uppercase tracking-wider ml-1">Telefone</label>

</div>
<div class="flex flex-col gap-1">
<label class="text-xs font-semibold text-on-surface-variant uppercase tracking-wider ml-1">E-mail</label>
<input class="w-full bg-surface-container-high px-4 py-3 rounded-lg border-b-2 border-transparent focus:border-primary focus:bg-surface-container-lowest focus:ring-0 transition-all outline-none font-medium text-on-surface" type="email" value="anabeatriz@atoslogos.com.br"/>
</div>

<div class="space-y-5">
<div class="grid grid-cols-2 gap-4">
<div class="flex flex-col gap-1">
<label class="text-xs font-semibold text-on-surface-variant uppercase tracking-wider ml-1">País</label>
<input class="w-full bg-surface-container-high px-4 py-3 rounded-lg border-b-2 border-transparent focus:border-primary focus:bg-surface-container-lowest focus:ring-0 transition-all outline-none font-medium text-on-surface" type="text" value="Brasil"/>

<div class="flex flex-col gap-1">
<label class="text-xs font-semibold text-on-surface-variant uppercase tracking-wider ml-1">Estado</label>
<input class="w-full bg-surface-container-high px-4 py-3 rounded-lg border-b-2 border-transparent focus:border-primary focus:bg-surface-container-lowest focus:ring-0 transition-all outline-none font-medium text-on-surface" type="text" value="SP"/>
</div>
</div>
<div class="grid grid-cols-2 gap-4">
<div class="flex flex-col gap-1">
<label class="text-xs font-semibold text-on-surface-variant uppercase tracking-wider ml-1">Cidade</label>
<input class="w-full bg-surface-container-high px-4 py-3 rounded-lg border-b-2 border-transparent focus:border-primary focus:bg-surface-container-lowest focus:ring-0 transition-all outline-none font-medium text-on-surface" type="text" value="São Paulo"/>
</div>
<div class="flex flex-col gap-1">
<label class="text-xs font-semibold text-on-surface-variant uppercase tracking-wider ml-1">Bairro</label>
<input class="w-full bg-surface-container-high px-4 py-3 rounded-lg border-b-2 border-transparent focus:border-primary focus:bg-surface-container-lowest focus:ring-0 transition-all outline-none font-medium text-on-surface" type="text" value="Jardins"/>

</div>
<div class="grid grid-cols-3 gap-4">

</div>
<div class="flex flex-col gap-1">
<label class="text-xs font-semibold text-on-surface-variant uppercase tracking-wider ml-1">Número</label>
<input class="w-full bg-surface-container-high px-4 py-3 rounded-lg border-b-2 border-transparent focus:border-primary focus:bg-surface-container-lowest focus:ring-0 transition-all outline-none font-medium text-on-surface" type="text" value="123"/>
</div>
</div>
<div class="flex flex-col gap-1">
<label class="text-xs font-semibold text-on-surface-variant uppercase tracking-wider ml-1">Logradouro/Complemento</label>
<input class="w-full bg-surface-container-high px-4 py-3 rounded-lg border-b-2 border-transparent focus:border-primary focus:bg-surface-container-lowest focus:ring-0 transition-all outline-none font-medium text-on-surface" placeholder="Apto, bloco, etc." type="text"/>
</div>

<div class="pt-4"><button class="w-full bg-primary text-on-primary py-4 rounded-xl font-headline font-bold text-lg shadow-lg shadow-primary/20 hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-2">SALVAR</button></div></div>

</main>

<span class="material-symbols-outlined" data-icon="calendar_month">calendar_month</span>
<span class="font-['Inter'] text-[11px] font-medium tracking-wide">Agenda</span>
</a>
<a class="flex flex-col items-center justify-center text-[#596065] dark:text-[#c4c7cb] px-4 py-1 hover:opacity-80 transition-opacity tap-highlight-transparent active:scale-90" href="#">
<span class="material-symbols-outlined" data-icon="notifications">notifications</span>
<span class="font-['Inter'] text-[11px] font-medium tracking-wide">Notificações</span>

<a class="flex flex-col items-center justify-center bg-[#cde6f4] dark:bg-[#37628a]/30 text-[#37628a] dark:text-[#a6d0fe] rounded-xl px-4 py-1 hover:opacity-80 transition-opacity tap-highlight-transparent active:scale-90" href="#">
<span class="material-symbols-outlined" data-icon="person" style="font-variation-settings: 'FILL' 1;">person</span>
